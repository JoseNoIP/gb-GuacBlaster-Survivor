name: Deploy → Google Play

# push a main  → Internal Testing (tú promueves a producción desde Play Console)
# tag v*.*.*   → Production (revisión Google + publicación automática)
on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Solo construir AAB (sin subir a Play Store)"
        type: boolean
        default: false

env:
  GODOT_VERSION: "4.7"
  EXPORT_PRESET: "Android"
  PACKAGE_NAME: "com.guacamolebit.guacblaster"

jobs:
  deploy:
    name: "Build AAB & Deploy (${{ github.ref_name }})"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Track y version code ─────────────────────────────────────────────
      - name: Determinar track y versión
        id: ctx
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "track=production" >> $GITHUB_OUTPUT
          else
            echo "track=internal"   >> $GITHUB_OUTPUT
          fi
          echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ── 3. Java (requerido por Gradle para AAB) ─────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. Godot headless ───────────────────────────────────────────────────
      - name: Instalar Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          rm godot.zip

      # ── 5. Export templates + Gradle build template ─────────────────────────
      - name: Instalar export templates y Gradle build template
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O templates.tpz

          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q templates.tpz -d templates_tmp
          mv templates_tmp/templates/* "$TEMPLATES_DIR/"

          echo "=== Archivos Android en TEMPLATES_DIR ==="
          ls "$TEMPLATES_DIR/" | grep -i android

          # Instalar Gradle build template (necesario para exportar AAB)
          ANDROID_SRC="$TEMPLATES_DIR/android_source.zip"
          if [ ! -f "$ANDROID_SRC" ]; then
            echo "ERROR: android_source.zip no encontrado. Contenido del directorio:"
            ls "$TEMPLATES_DIR/"
            exit 1
          fi

          echo "=== Primeros 20 entries de android_source.zip ==="
          unzip -l "$ANDROID_SRC" | head -25

          mkdir -p android/
          unzip -q "$ANDROID_SRC" -d android/

          echo "=== Estructura android/ después de extraer ==="
          find android/ -maxdepth 3 | head -30

          # chmod gradlew dondequiera que esté dentro de android/
          find android/ -name "gradlew" -exec chmod +x {} \;

          rm -rf templates_tmp templates.tpz

      # ── 6. Keystore de release + version code ───────────────────────────────
      - name: Configurar keystore y version code
        env:
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/guacblaster.keystore

          sed -i "s|keystore/release=\"[^\"]*\"|keystore/release=\"/tmp/guacblaster.keystore\"|" export_presets.cfg
          sed -i "s|keystore/release_user=\"[^\"]*\"|keystore/release_user=\"$KEYSTORE_ALIAS\"|" export_presets.cfg
          sed -i "s|keystore/release_password=\"[^\"]*\"|keystore/release_password=\"$KEYSTORE_PASS\"|" export_presets.cfg

          # Version code auto-incremental basado en run number de GitHub
          sed -i "s|version/code=[0-9]*|version/code=${{ steps.ctx.outputs.version_code }}|" export_presets.cfg

          # Habilitar Gradle build para producir AAB
          sed -i "s|gradle_build/use_gradle_build=false|gradle_build/use_gradle_build=true|" export_presets.cfg

          echo "--- export_presets.cfg (sección clave) ---"
          grep -E "keystore|version/code|gradle_build/use" export_presets.cfg

      # ── 7. Verificar Android SDK ─────────────────────────────────────────────
      - name: Verificar Android SDK
        run: echo "ANDROID_HOME=$ANDROID_HOME"

      # ── 8. Exportar AAB ──────────────────────────────────────────────────────
      - name: Exportar AAB release
        run: |
          mkdir -p builds/
          godot --headless \
            --export-release "${{ env.EXPORT_PRESET }}" \
            "builds/GuacBlaster.aab"

      - name: Verificar AAB generado
        run: ls -lh builds/

      # ── 9. Guardar artefacto (para debugging) ───────────────────────────────
      - name: Guardar AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ steps.ctx.outputs.track }}-${{ github.run_number }}
          path: builds/GuacBlaster.aab
          retention-days: 30

      # ── 10. Subir a Google Play ──────────────────────────────────────────────
      - name: Subir a Google Play — track ${{ steps.ctx.outputs.track }}
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_upload == false }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: builds/GuacBlaster.aab
          track: ${{ steps.ctx.outputs.track }}
          status: completed
